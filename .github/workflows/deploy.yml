name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - run: npm ci
        working-directory: functions
      - run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> functions/.env
      - run: echo "HEVY_API_KEY=${{ secrets.HEVY_API_KEY }}" >> functions/.env
      - run: echo "PRESS_OWNER_UID=uqJcOkpVXGYLjngCWCi0LvmSv8q1" >> functions/.env

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --project pressnewsletter --force
