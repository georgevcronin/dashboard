<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Exercise → Muscle Mapper</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; }
  p.hint { color: #999; font-size: 13px; }
  input[type=text] { background: #222; border: 1px solid #444; color: #eee; padding: 6px 8px; border-radius: 4px; width: 260px; }
  .row { border-bottom: 1px solid #333; padding: 10px 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .row .name { width: 200px; font-weight: 600; flex-shrink: 0; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .chip { border: 1px solid #555; border-radius: 12px; padding: 3px 10px; font-size: 12px; cursor: pointer; user-select: none; background: #1a1a1a; color: #aaa; }
  .chip.primary { background: #3a6; color: #fff; border-color: #3a6; }
  .chip.secondary { background: #a80; color: #fff; border-color: #a80; }
  .del { color: #a55; cursor: pointer; font-size: 12px; }
  #controls { position: sticky; top: 0; background: #111; padding: 12px 0; border-bottom: 1px solid #444; margin-bottom: 8px; z-index: 5; }
  button { background: #357; color: #fff; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; margin-right: 8px; }
  button:hover { background: #468; }
  textarea { width: 100%; height: 240px; background: #000; color: #7f7; font-family: monospace; font-size: 12px; margin-top: 10px; }
  #status { color: #6c6; font-size: 12px; margin-left: 8px; }
</style>
</head>
<body>
<h1>Exercise → Muscle Mapper</h1>
<p class="hint">Click a chip to cycle: off → primary (green) → secondary (amber) → off. Chips already lit are the app's current best guess. Edits autosave in this browser. When done, click Export and send the output back.</p>

<div id="controls">
  <input type="text" id="filter" placeholder="Filter exercises…">
  <input type="text" id="newEx" placeholder="Add exercise name…">
  <button id="addBtn">Add</button>
  <button id="exportBtn">Export mapping</button>
  <button id="resetBtn">Reset to app defaults</button>
  <span id="status"></span>
</div>

<div id="list"></div>

<textarea id="out" style="display:none"></textarea>

const ALL_MUSCLES = ['glutes','quads','hamstrings','adductors','calves','erectors','chest','upper-chest','abs','obliques','hip-flexors','biceps','triceps','forearms','traps','front-delt','lateral-delt','rear-delt','lats','rhomboids','neck'];

// The richer exercise DB uses some finer-grained muscle names the app doesn't track separately.
// Collapse those onto the nearest muscle the app actually recognizes.
const MUSCLE_COLLAPSE = {
  abductors: 'glutes', brachialis: 'biceps', brachioradialis: 'forearms',
  core: 'abs', 'lower-traps': 'traps', 'mid-delt': 'lateral-delt',
  'mid-traps': 'traps', 'rotator-cuff': 'rear-delt', serratus: 'chest',
  shoulders: 'front-delt', 'teres-major': 'lats', tibialis: 'calves', 'transverse-abs': 'abs',
};
function collapseList(muscles, name) {
  let out = [...new Set(muscles.map(m => MUSCLE_COLLAPSE[m] || m).filter(m => ALL_MUSCLES.includes(m)))];
  // Incline pressing/flye variants (or names that say "upper chest") bias toward upper-chest.
  if (name && /incline|upper chest/.test(name) && out.includes('chest')) {
    out = out.filter(m => m !== 'chest').concat('upper-chest');
  }
  return out;
}
// Collapses a {primary, secondary} pair, keeping a muscle only in primary if it lands in both.
function collapse(pair, name) {
  const primary = collapseList(pair.primary || [], name);
  const secondary = collapseList(pair.secondary || [], name).filter(m => !primary.includes(m));
  return { primary, secondary };
}

// Best-effort fuzzy match of a logged name against the structured exercise DB, by word overlap.
function matchDB(name) {
  const core = name.replace(/\(.*?\)/g, '').trim();
  const exact = EXERCISE_DB.find(e => e.name === name || e.name === core);
  if (exact) return exact;
  const nameWords = new Set(core.split(/\s+/).filter(Boolean));
  let best = null, bestScore = 0;
  EXERCISE_DB.forEach(e => {
    const dbWords = e.name.replace(/[/-]/g, ' ').split(/\s+/).filter(Boolean);
    const overlap = dbWords.filter(w => nameWords.has(w)).length;
    const score = overlap / Math.max(dbWords.length, nameWords.size);
    if (score > bestScore) { bestScore = score; best = e; }
  });
  return bestScore >= 0.5 ? best : null;
}

","core","glutes"]},{"name":"overhead cable face pull","primary":["rear-delt","rotator-cuff","mid-traps"],"secondary":["rhomboids"]},{"name":"adductor squeeze squat","primary":["adductors","quads","glutes"],"secondary":["hamstrings"]}];

// Old substring keyword-guess logic, used only to prefill BASE_EXERCISES names not covered above.
const MUSCLE_MAP = {
  'hack squat': ['quads','glutes'], 'squat': ['quads','glutes','hamstrings'],
  'leg press': ['quads','glutes'], 'leg curl': ['hamstrings'], 'leg extension': ['quads'],
  'lunge': ['quads','glutes','hamstrings'], 'hip thrust': ['glutes'], 'glute': ['glutes'],
  'deadlift': ['hamstrings','glutes','erectors','lats'], 'rdl': ['hamstrings','glutes','erectors'],
  'calf': ['calves'], 'pull up': ['lats','biceps'], 'chin up': ['lats','biceps'],
  'lat pulldown': ['lats','biceps'], 'row': ['lats','rhomboids','biceps'],
  'bench press': ['chest','triceps','front-delt'], 'chest press': ['chest','triceps','front-delt'],
  'fly': ['chest','front-delt'], 'dip': ['chest','triceps'],
  'overhead press': ['front-delt','triceps'], 'shoulder press': ['front-delt','triceps'],
  'lateral raise': ['rear-delt'], 'face pull': ['rear-delt','rhomboids'],
  'tricep': ['triceps'], 'triceps': ['triceps'],
  'bicep': ['biceps'], 'curl': ['biceps'],
  'ab': ['abs'], 'crunch': ['abs'], 'plank': ['abs'], 'sit up': ['abs'],
  'oblique': ['obliques'], 'shrug': ['traps'], 'trap': ['traps'],
  'forearm': ['forearms'], 'wrist': ['forearms'],
};

// Old keyword guesser has no primary/secondary notion — everything it finds counts as primary.
function guess(name) {
  for (const [key, muscles] of Object.entries(MUSCLE_MAP)) {
    if (name.includes(key)) return { primary: [...muscles], secondary: [] };
  }
  return { primary: [], secondary: [] };
}

function defaultData() {
  const data = {};
  LOGGED_EXERCISES.forEach(name => {
    const hit = matchDB(name);
    data[name] = hit ? collapse({ primary: hit.primary, secondary: hit.secondary }, name) : collapse(guess(name), name);
  });
  return data;
}

// Normalizes older flat-array entries (from before the primary/secondary split) into the new shape.
function normalize(entry) {
  if (Array.isArray(entry)) return { primary: entry, secondary: [] };
  return { primary: entry.primary || [], secondary: entry.secondary || [] };
}

const STORAGE_KEY = 'exerciseMuscleMapper_v7';
let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
if (!data) {
  // Migrate any edits made under earlier tool versions (only for names we still show), then fill in the rest from the DB.
  const old = JSON.parse(localStorage.getItem('exerciseMuscleMapper_v6') || localStorage.getItem('exerciseMuscleMapper_v5') || localStorage.getItem('exerciseMuscleMapper_v4') || localStorage.getItem('exerciseMuscleMapper_v3') || localStorage.getItem('exerciseMuscleMapper_v2') || localStorage.getItem('exerciseMuscleMapper_v1') || 'null') || {};
  data = defaultData();
  Object.keys(old).filter(name => LOGGED_EXERCISES.includes(name)).forEach(name => { data[name] = collapse(normalize(old[name]), name); });
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function render() {
  const filter = document.getElementById('filter').value.toLowerCase();
  const list = document.getElementById('list');
  list.innerHTML = '';
  Object.keys(data).sort().forEach(name => {
    if (filter && !name.includes(filter)) return;
    const row = document.createElement('div');
    row.className = 'row';

    const label = document.createElement('div');
    label.className = 'name';
    label.textContent = name;
    row.appendChild(label);

    const chips = document.createElement('div');
    chips.className = 'chips';
    ALL_MUSCLES.forEach(m => {
      const chip = document.createElement('span');
      const state = data[name].primary.includes(m) ? 'primary' : data[name].secondary.includes(m) ? 'secondary' : null;
      chip.className = 'chip' + (state ? ' ' + state : '');
      chip.textContent = m;
      chip.onclick = () => {
        // Cycle: off → primary → secondary → off.
        data[name].primary = data[name].primary.filter(x => x !== m);
        data[name].secondary = data[name].secondary.filter(x => x !== m);
        if (state === null) data[name].primary.push(m);
        else if (state === 'primary') data[name].secondary.push(m);
        save();
        render();
      };
      chips.appendChild(chip);
    });
    row.appendChild(chips);

    const del = document.createElement('span');
    del.className = 'del';
    del.textContent = 'remove';
    del.onclick = () => { delete data[name]; save(); render(); };
    row.appendChild(del);

    list.appendChild(row);
  });
}

document.getElementById('filter').oninput = render;

document.getElementById('addBtn').onclick = () => {
  const input = document.getElementById('newEx');
  const name = input.value.trim().toLowerCase();
  if (!name) return;
  if (!(name in data)) { const hit = matchDB(name); data[name] = hit ? collapse({ primary: hit.primary, secondary: hit.secondary }, name) : collapse(guess(name), name); }
  input.value = '';
  save();
  render();
};

document.getElementById('resetBtn').onclick = () => {
  if (!confirm('Reset all edits back to the app\'s current keyword-guess defaults?')) return;
  data = defaultData();
  save();
  render();
};

document.getElementById('exportBtn').onclick = () => {
  const lines = Object.keys(data).sort().map(name => {
    const primary = data[name].primary.map(m => `'${m}'`).join(',');
    const secondary = data[name].secondary.map(m => `'${m}'`).join(',');
    return `  '${name}': { primary: [${primary}], secondary: [${secondary}] },`;
  });
  const text = `const EXERCISE_MUSCLES = {\n${lines.join('\n')}\n};`;
  const out = document.getElementById('out');
  out.style.display = 'block';
  out.value = text;
  out.select();
  navigator.clipboard?.writeText(text).then(() => {
    document.getElementById('status').textContent = 'Copied to clipboard ✓';
  }).catch(() => {
    document.getElementById('status').textContent = 'Copy failed — select text manually below.';
  });
};

render();
</script>
